networks:
  monitoring:
    driver: bridge

volumes:
  icinga2_data:
  grafana_data:
  webhook_logs:
  mariadb_data:

services:

  # ── MariaDB (databases for IDO, Icinga Web 2, Director) ──────
  mariadb:
    image: mariadb:10.11
    container_name: testenv-mariadb
    hostname: mariadb
    networks:
      - monitoring
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Icinga2 (custom build with API + IDO MySQL + test host) ──
  icinga2:
    build:
      context: ./icinga2
      dockerfile: Dockerfile
    container_name: testenv-icinga2
    hostname: icinga2
    networks:
      - monitoring
    ports:
      - "5665:5665"
    volumes:
      - icinga2_data:/data
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: >-
        curl -fs -k -u apiuser:apipassword
        https://localhost:5665/v1/status || exit 1
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ── Icinga Web 2 + Director ──────────────────────────────────
  icingaweb2:
    build:
      context: ./icingaweb2
      dockerfile: Dockerfile
    container_name: testenv-icingaweb2
    hostname: icingaweb2
    networks:
      - monitoring
    ports:
      - "8082:8080"
    environment:
      # ── Resources ──
      icingaweb.resources.icingaweb_db.type: db
      icingaweb.resources.icingaweb_db.db: mysql
      icingaweb.resources.icingaweb_db.host: mariadb
      icingaweb.resources.icingaweb_db.dbname: icingaweb2
      icingaweb.resources.icingaweb_db.username: icingaweb2
      icingaweb.resources.icingaweb_db.password: icingaweb2pass
      icingaweb.resources.icingaweb_db.charset: utf8mb4

      icingaweb.resources.icinga_ido.type: db
      icingaweb.resources.icinga_ido.db: mysql
      icingaweb.resources.icinga_ido.host: mariadb
      icingaweb.resources.icinga_ido.dbname: icinga2_ido
      icingaweb.resources.icinga_ido.username: icinga2_ido
      icingaweb.resources.icinga_ido.password: icinga2_idopass
      icingaweb.resources.icinga_ido.charset: utf8mb4

      icingaweb.resources.director_db.type: db
      icingaweb.resources.director_db.db: mysql
      icingaweb.resources.director_db.host: mariadb
      icingaweb.resources.director_db.dbname: director
      icingaweb.resources.director_db.username: director
      icingaweb.resources.director_db.password: directorpass
      icingaweb.resources.director_db.charset: utf8mb4

      # ── Global config ──
      icingaweb.config.global.show_stacktraces: "1"
      icingaweb.config.global.config_backend: db
      icingaweb.config.global.config_resource: icingaweb_db
      icingaweb.config.logging.log: syslog
      icingaweb.config.logging.level: ERROR

      # ── Authentication ──
      icingaweb.authentication.icingaweb2.backend: db
      icingaweb.authentication.icingaweb2.resource: icingaweb_db

      # ── Groups ──
      icingaweb.groups.icingaweb2.backend: db
      icingaweb.groups.icingaweb2.resource: icingaweb_db

      # ── Roles ──
      icingaweb.roles.Administrators.users: admin
      icingaweb.roles.Administrators.permissions: "*"

      # ── Enabled modules ──
      icingaweb.enabledModules: monitoring, director, incubator

      # ── Monitoring module ──
      icingaweb.modules.monitoring.config.security.protected_customvars: "*pw*,*pass*,community"
      icingaweb.modules.monitoring.backends.icinga2.type: ido
      icingaweb.modules.monitoring.backends.icinga2.resource: icinga_ido
      icingaweb.modules.monitoring.commandtransports.icinga2.transport: api
      icingaweb.modules.monitoring.commandtransports.icinga2.host: icinga2
      icingaweb.modules.monitoring.commandtransports.icinga2.port: "5665"
      icingaweb.modules.monitoring.commandtransports.icinga2.username: apiuser
      icingaweb.modules.monitoring.commandtransports.icinga2.password: apipassword

      # ── Director module ──
      icingaweb.modules.director.config.db.resource: director_db
      icingaweb.modules.director.kickstart.config.endpoint: icinga2
      icingaweb.modules.director.kickstart.config.host: icinga2
      icingaweb.modules.director.kickstart.config.port: "5665"
      icingaweb.modules.director.kickstart.config.username: apiuser
      icingaweb.modules.director.kickstart.config.password: apipassword
    depends_on:
      mariadb:
        condition: service_healthy
      icinga2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null",
             "http://localhost:8080/authentication/login"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Prometheus ─────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: testenv-prometheus
    networks:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Grafana ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: testenv-grafana
    networks:
      - monitoring
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_UNIFIED_ALERTING_ENABLED=true
      - GF_ALERTING_ENABLED=false
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Webhook Bridge ─────────────────────────────────────────────
  webhook-bridge:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: testenv-webhook-bridge
    networks:
      - monitoring
    ports:
      - "9080:8080"
    env_file:
      - .env.test
    volumes:
      - webhook_logs:/var/log/webhook-bridge
    depends_on:
      icinga2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
