// Default host (container itself)
object Host NodeName {
  import "generic-host"
  address = "127.0.0.1"
  address6 = "::1"
  vars.os = "Linux"
}

// Passive-only dummy host for webhook-bridge services
// No address/os vars → no default service apply rules trigger
object Host "test-host" {
  check_command = "dummy"
  vars.dummy_state = 0
  vars.dummy_text = "Passive host for Grafana webhook alerts"
  display_name = "Test Host - webhook-bridge dev"
  vars.managed_by = "webhook-bridge"
}
