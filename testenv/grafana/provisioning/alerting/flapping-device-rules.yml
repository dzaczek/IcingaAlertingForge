apiVersion: 1

groups:
  - orgId: 1
    name: synthetic-flapping-devices
    folder: Test Alerts
    interval: 10s
    rules:
      - uid: flap_dev_01
        title: "Synthetic Device 01"
        condition: B
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: prometheus-iaf-testenv
            model:
              editorMode: code
              expr: "vector((((time() + 0) % 120) < bool 60) * 1)"
              instant: true
              intervalMs: 1000
              legendFormat: ""
              maxDataPoints: 43200
              range: false
              refId: A
          - refId: B
            queryType: ""
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: __expr__
            model:
              expression: "$A > 0"
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: math
        dashboardUid: ""
        panelId: 0
        noDataState: NoData
        execErrState: Error
        for: 0s
        annotations:
          summary: "Lab Device 01 flips every 60s"
          description: "CRITICAL/OK flapping test device with 0s phase offset"
        labels:
          alertname: "Lab Device 01 Flap"
          severity: critical
          device: "lab-device-01"
          source: "synthetic-lab"
          pattern: "minute-flap"
        isPaused: false
